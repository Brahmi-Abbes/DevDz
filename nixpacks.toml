[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.mbstring",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.ctype",
  "php84Extensions.fileinfo",
  "php84Extensions.curl",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.gd",
  "nodejs_18",
  "npm-9_x"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php-fpm"